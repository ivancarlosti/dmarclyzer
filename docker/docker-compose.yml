services:
  dmarclyzer:
    image: ghcr.io/ivancarlosti/dmarclyzer:latest
    container_name: dmarclyzer_app
    restart: unless-stopped
    ports:
      - "${PORT:-8080}:8080"
    depends_on:
      db:
        condition: service_healthy
    env_file:
      - .env
    environment:
      AUTH_METHOD: ${AUTH_METHOD:-none}
      ACCOUNT_LOGIN: ${ACCOUNT_LOGIN}
      ACCOUNT_PASSWORD: ${ACCOUNT_PASSWORD}
      RECAPTCHA_CLIENTID: ${RECAPTCHA_CLIENTID}
      RECAPTCHA_CLIENTSECRET: ${RECAPTCHA_CLIENTSECRET}
      KEYCLOAK_BASE_URL: ${KEYCLOAK_BASE_URL}
      KEYCLOAK_REALM: ${KEYCLOAK_REALM}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET}
      KEYCLOAK_REDIRECT_URI: ${KEYCLOAK_REDIRECT_URI}
      KEYCLOAK_EMAIL_ACCOUNT: ${KEYCLOAK_EMAIL_ACCOUNT}
  db:
    image: mariadb:10.11
    container_name: dmarclyzer_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_password}
      MYSQL_DATABASE: ${DB_NAME:-dmarc}
      MYSQL_USER: ${DB_USER:-dmarcuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-dmarcpass}
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  db_data:
